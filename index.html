<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBuddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>StudyBuddy</h1>
        <p class="subtitle">Organize your homework tasks easily</p>

        <div class="task-input">
            <input type="text" id="taskInput" placeholder="Enter a homework task">
            <button id="addTaskBtn">Add Task</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
